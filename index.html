<!-- Zoek in je huidige code naar de <form> tag en de footer en vervang deze onderdelen, of kopieer deze volledige sectie -->

    <section class="contact-wrap">
        <div class="contact-card">
            <h2 style="margin-bottom:10px">Partner With Us</h2>
            <p style="color: var(--light-slate); margin-bottom: 35px;">Discuss your next project with our senior media consultants.</p>
            
            <!-- Bijgewerkt e-mailadres: hello@echostreammediagroup.com -->
            <form action="mailto:hello@echostreammediagroup.com" method="post" enctype="text/plain">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label>Work Email</label>
                    <input type="email" name="email" placeholder="you@company.com" required>
                </div>
                <div class="form-group">
                    <label>Project Brief</label>
                    <textarea name="message" rows="5" placeholder="How can we assist your media growth?" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </div>
    </section>

    <footer>
        <p><strong>&copy; 2026 Echo Stream Media Group Ltd.</strong></p>
        <address class="footer-address">
            Trident Chambers, Wickhams Cay, Road Town<br>
            PO Box 146, Tortola, British Virgin Islands
        </address>
    </footer>
